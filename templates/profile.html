<!DOCTYPE html>
<html>
<head>
    <title>Profile - Airtel Payments Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .profile-card {
            border-radius: 20px;
        }

        .profile-header {
            background: linear-gradient(135deg,#e60000,#ff4d4d);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 30px;
            text-align: center;
        }

        .avatar {
            font-size: 60px;
        }

        .section-title {
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card profile-card shadow">

        <!-- Header -->
        <div class="profile-header">
            <div class="avatar">👤</div>
            <h4>{{ user.full_name }}</h4>
            <span class="badge bg-dark">{{ user.role }}</span>
        </div>

        <div class="card-body">

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <!-- Account Info -->
            <h5 class="section-title">Account Information</h5>

            <form method="POST">
                <input type="hidden" name="update_profile" value="1">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" value="{{ user.mobile }}" class="form-control" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Current Balance</label>
                    <input type="text" value="₹ {{ user.balance }}" class="form-control" disabled>
                </div>

                <button type="submit" class="btn btn-danger w-100">
                    Update Profile
                </button>
            </form>

            <hr>

            <hr>

<h5 class="section-title">Change Password 🔐</h5>

<form method="POST">
    <input type="hidden" name="change_password" value="1">

    <!-- Current Password -->
    <div class="mb-3 position-relative">
        <label class="form-label">Current Password</label>
        <input type="password" id="current_password" name="current_password" class="form-control" required>
        <span onclick="togglePassword('current_password')" 
              style="position:absolute; right:15px; top:38px; cursor:pointer;">👁️</span>
    </div>

    <!-- New Password -->
    <div class="mb-3 position-relative">
        <label class="form-label">New Password</label>
        <input type="password" id="new_password" name="new_password" class="form-control" required>
        <span onclick="togglePassword('new_password')" 
              style="position:absolute; right:15px; top:38px; cursor:pointer;">👁️</span>
    </div>

    <!-- Confirm Password -->
    <div class="mb-3 position-relative">
        <label class="form-label">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        <span onclick="togglePassword('confirm_password')" 
              style="position:absolute; right:15px; top:38px; cursor:pointer;">👁️</span>
    </div>

    <button type="submit" class="btn btn-dark w-100">
        Change Password
    </button>
</form>

            <hr>

            <!-- Back Button -->
            <div class="text-center">
                <a href="/dashboard" class="btn btn-outline-dark">
                    ← Back to Dashboard
                </a>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }
}

</script>

</body>
</html>
