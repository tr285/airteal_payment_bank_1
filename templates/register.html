<!DOCTYPE html>
<html>
<head>
    <title>Airtel Payment Bank - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ad0000, #ff4d4d);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            animation: float 10s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 15%;
        }

        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            bottom: 10%;
            right: 20%;
            animation-duration: 12s;
        }

        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 30%;
            left: 40%;
            animation-duration: 8s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
            100% { transform: translateY(0px); }
        }

        .card {
            border-radius: 20px;
            z-index: 2;
        }

        .brand-title {
            color: #004aad;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #004aad;
            border: none;
        }

        .btn-primary:hover {
            background-color: #003080;
        }
    </style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="card shadow-lg p-4" style="width: 400px;">
    <h3 class="text-center brand-title mb-3">Airtel Payment Bank</h3>
    <h5 class="text-center mb-4">Create Account</h5>

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="full_name" class="form-control" placeholder="Full Name" required>
        </div>

        <div class="mb-3">
            <input type="text" name="mobile" class="form-control" placeholder="Mobile Number" maxlength="10" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>

    <div class="text-center mt-3">
        <small>Already have an account?</small><br>
        <a href="/login">Login Here</a>
    </div>
</div>

</body>
</html>
