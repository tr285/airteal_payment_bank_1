<!DOCTYPE html>
<html>
<head>
    <title>Payment Receipt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .receipt-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 500px;
            margin: auto;
        }

        .success-icon {
            font-size: 60px;
            color: green;
        }

        .receipt-title {
            color: #e60000;
            font-weight: bold;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="receipt-card text-center">

        <div class="success-icon">✅</div>

        <h4 class="receipt-title mt-3">Payment Successful</h4>

        <hr>

        <div class="info-row">
            <span>Transaction ID</span>
            <strong>{{ transaction_id }}</strong>
        </div>

        <div class="info-row">
            <span>Amount Paid</span>
            <strong>₹ {{ amount }}</strong>
        </div>

        <div class="info-row">
            <span>UPI ID</span>
            <strong>{{ upi_id }}</strong>
        </div>

        <div class="info-row">
            <span>Date & Time</span>
            <strong>{{ payment_time }}</strong>
        </div>

        <hr>

        <a href="/dashboard" class="btn btn-danger mt-3 w-100">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
