<!DOCTYPE html>
<html>
<head>
    <title>Transfer Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }

        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 450px;
            margin: 100px auto;
        }

        .checkmark {
            font-size: 70px;
            color: green;
            animation: pop 0.6s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-danger {
            background-color: #e60000;
            border: none;
        }

        .btn-danger:hover {
            background-color: #cc0000;
        }
    </style>
</head>

<body>

<div class="success-card">

    <div class="checkmark">✅</div>

    <h4 class="mt-3">Transfer Successful</h4>

    <p class="mt-3">
        ₹ {{ amount }} has been sent to <strong>{{ receiver_name }}</strong>
    </p>

    <div class="mt-4">
        <a href="/dashboard" class="btn btn-danger w-100">
            Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
