<!DOCTYPE html>
<html>
<head>
    <title>Transfer Money</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .transfer-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 500px;
            margin: auto;
        }

        .btn-danger {
            background-color: #e60000;
            border: none;
        }

        .btn-danger:hover {
            background-color: #cc0000;
        }

        .balance-box {
            background: #fff3f3;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            color: #e60000;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="transfer-card">

        <h4 class="text-center mb-4">Transfer Money 💸</h4>

        <div class="balance-box">
            Available Balance: ₹ {{ balance }}
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <label>Receiver Mobile Number</label>
                <input type="text" name="receiver_mobile" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Amount</label>
                <input type="number" name="amount" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-danger w-100">
                Confirm Transfer
            </button>

        </form>

        <a href="/dashboard" class="btn btn-outline-secondary w-100 mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
