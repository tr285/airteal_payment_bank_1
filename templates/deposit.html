<!DOCTYPE html>
<html>
<head>
    <title>Add Money - Airtel Payments Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-custom {
            background-color: #e60000;
        }

        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link {
            color: white !important;
        }

        .deposit-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .btn-primary {
            background-color: #e60000;
            border: none;
        }

        .btn-primary:hover {
            background-color: #cc0000;
        }

        .hidden {
            display: none;
        }

        #qrcode {
            margin: 20px auto;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#">Airtel Payments Bank</a>
        <a class="nav-link text-white" href="/dashboard">Back</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="deposit-card">

        <h4 class="mb-4">Add Money via UPI 💳</h4>

        <form id="depositForm" method="POST">

    <div id="inputSection">
        <div class="mb-3">
            <label>Enter Amount</label>
            <input type="number" id="amount" name="amount" class="form-control" required>
        </div>

        <button type="button" class="btn btn-danger w-100" onclick="generateUPI()">
            Generate QR
        </button>
    </div>

    <div id="upiSection" class="hidden text-center">

        <h5 class="mt-4">Scan to Pay</h5>

        <img src="{{ url_for('static', filename='images/myupi.jpg') }}"
             class="img-fluid mt-3"
             style="max-width:300px; border-radius:15px;">

        <p class="mt-3"><strong>UPI ID:</strong> goretukaram62@okicici</p>
        <p><strong>Amount:</strong> ₹ <span id="displayAmount"></span></p>

        <!-- IMPORTANT: type="submit" -->
        <button type="submit" class="btn btn-success mt-3 w-100">
            I Have Paid
        </button>

    </div>

</form>

        <!-- UPI QR Section -->
        <div id="upiSection" class="hidden text-center">

    <h5 class="mt-4">Scan to Pay</h5>

    <img src="{{ url_for('static', filename='images/myupi.jpg') }}" 
         class="img-fluid mt-3" 
         style="max-width:300px; border-radius:15px;">

    <p class="mt-3"><strong>UPI ID:</strong> goretukaram62@okicici</p>

    <p><strong>Amount:</strong> ₹ <span id="displayAmount"></span></p>

    <button class="btn btn-success mt-3" onclick="submitPayment()">
        I Have Paid
    </button>

</div>

    </div>
</div>
<script>
function generateUPI() {
    const amount = document.getElementById("amount").value;

    if (!amount || amount <= 0) {
        alert("Enter valid amount");
        return;
    }

    document.getElementById("inputSection").style.display = "none";
    document.getElementById("upiSection").classList.remove("hidden");
    document.getElementById("displayAmount").innerText = amount;
}
</script>



</body>
</html>
