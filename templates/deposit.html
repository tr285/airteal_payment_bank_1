{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <h4 class="fw-bold mb-4">Add Money via QR</h4>
        <div class="glass-card p-4 text-center">
            
            <p class="text-muted small mb-4">Scan the QR code below using any UPI app (GPay, PhonePe, Paytm) to deposit funds. For testing purposes, entering an amount and clicking simulate will add funds instantly.</p>
            
            <!-- Mocked QR Code - Base64 transparent image or simply styled square -->
            <div class="bg-white p-3 d-inline-block rounded shadow-sm mb-4">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=simulate@airtel&pn=AirtelBank&cu=INR" alt="QR Code" class="img-fluid" width="200" height="200">
            </div>

            <div class="fw-bold mb-4">UPI: airtelbank@upi</div>

            <form action="/deposit" method="POST" class="needs-validation" novalidate onsubmit="return confirm('Simulate success of this deposit?');">
                <div class="input-group mb-3">
                    <span class="input-group-text bg-transparent text-primary fw-bold">₹</span>
                    <input type="number" class="form-control bg-transparent fw-bold" name="amount" placeholder="Amount to Add" min="1" required>
                    <button class="btn btn-fintech" type="submit">Simulate Payment</button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
